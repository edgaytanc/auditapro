{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">

</head>
<body>
    <body>
        <div class="container">
          <div class="row justify-content-center">
            <div class="col-md-6">
              <div class="text-center">
                <!-- Espacio para el logo -->
                <br>
                <img src="{% static 'img/logo-vertical.png' %}" alt="Logo" class="mb-4 logo">
              </div>
              <div class="card">
                <div class="card-body">
                  <h5 class="card-title text-center mb-4">Iniciar Sesión</h5>
                  <form method="post" action="{% url 'login' %}">
                    {% csrf_token %}
                    <div class="form-group">
                      <label for="id_username">Usuario:</label>
                      <input type="text" class="form-control" name="username" id="id_username" required>
                    </div>
                    <div class="form-group">
                      <label for="id_password">Contraseña:</label>
                      <input type="password" class="form-control" name="password" id="id_password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Entrar</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      
        <!-- Opcional: JavaScript y dependencias de Bootstrap -->
        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.9.3/dist/umd/popper.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
      </body>
      </html>
      
</body>
</html>
